<!DOCTYPE html>
<html>
<head>
  <title>Kpakpiri — Tree Planting Sites</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.css" />

  <!-- Google Fonts: serif for titles, clean sans for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bgs-cream:    #ffffff;
      --bgs-border:   #2c2c2c;
      --bgs-rule:     #8a8275;
      --bgs-title:    #1a1a1a;
      --bgs-subtitle: #4a4a4a;
      --bgs-muted:    #6b6459;
      --bgs-accent:   #c0392b;
      --serif:        'Playfair Display', 'Georgia', serif;
      --sans:         'Source Sans 3', 'Helvetica Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bgs-cream);
      font-family: var(--sans);
      color: var(--bgs-title);
    }

    /* ── Page frame ── */
    .sheet {
      display: grid;
      grid-template-rows: 1fr auto;
      grid-template-columns: 1fr 220px;
      height: 100vh;
      padding: 18px 22px;
      gap: 0;
    }

    /* ── Map container with formal border + tick marks ── */
    .map-frame {
      position: relative;
      border: 2px solid var(--bgs-border);
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Graticule tick marks along map border */
    .tick-marks {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 800;
    }

    .tick {
      position: absolute;
      background: var(--bgs-border);
    }

    .tick-top, .tick-bottom { width: 2px; height: 16px; }
    .tick-left, .tick-right { width: 16px; height: 2px; }

    .tick-label {
      position: absolute;
      font-size: 0.75rem;
      font-family: var(--sans);
      font-weight: 700;
      color: var(--bgs-border);
      pointer-events: none;
      z-index: 801;
      white-space: nowrap;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.85), -1px -1px 2px rgba(255,255,255,0.85);
    }

    /* B&W desaturated tiles */
    .bw-tile {
      filter: grayscale(100%) brightness(92%) contrast(1.05) !important;
    }

    /* ── Right-hand sidebar: legend + inset ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-left: 14px;
      overflow-y: auto;
    }

    .panel {
      background: transparent;
      padding: 4px 0;
    }

    .panel-title {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1.5px solid var(--bgs-border);
      padding-bottom: 5px;
      margin-bottom: 8px;
    }

    /* Legend */
    .legend-row {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      font-size: 0.8rem;
    }

    .legend-swatch {
      width: 28px;
      height: 16px;
      border: 1px solid #333;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .legend-label {
      font-weight: 400;
      color: var(--bgs-title);
    }

    .legend-code {
      font-weight: 600;
      margin-right: 4px;
      min-width: 16px;
    }

    /* Inset / location map */
    .inset-map {
      width: 100%;
      height: 180px;
      border: 1px solid var(--bgs-border);
    }

    /* North arrow */
    .north-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 0;
    }

    .north-arrow svg {
      width: 28px;
      height: 50px;
    }

    .north-arrow span {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 2px;
    }

    /* Scale bar panel */
    .scale-bar-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .scale-bar {
      display: flex;
      height: 8px;
      border: 1px solid var(--bgs-border);
      overflow: hidden;
      margin-top: 4px;
      width: 100%;
    }

    .scale-segment {
      flex: 1;
      height: 100%;
    }

    .scale-segment:nth-child(odd) { background: var(--bgs-border); }
    .scale-segment:nth-child(even) { background: #fff; }

    .scale-labels {
      position: relative;
      width: 100%;
      height: 1.1em;
      margin-top: 2px;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--bgs-title);
    }

    .scale-labels span {
      position: absolute;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .scale-labels span:first-child {
      transform: translateX(0);
    }

    .scale-labels span:last-child {
      transform: translateX(-100%);
    }

    .scale-unit {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--bgs-muted);
      margin-top: 2px;
    }

    .scale-ratio {
      font-size: 0.65rem;
      color: var(--bgs-muted);
      margin-top: 3px;
      font-weight: 600;
    }

    /* ── Footer ── */
    .footer {
      grid-column: 1 / 2;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-top: 10px;
      padding-top: 8px;
    }

    .footer-logo {
      height: 56px;
      width: auto;
      flex-shrink: 0;
    }

    .footer-identity {
      flex-shrink: 0;
    }

    .footer-title {
      font-family: var(--serif);
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #24330d;
      line-height: 1.15;
    }

    .footer-subtitle {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.82rem;
      color: var(--bgs-subtitle);
      letter-spacing: 0.04em;
    }

    .footer-table {
      border-collapse: collapse;
      font-size: 0.72rem;
      line-height: 1.3;
      margin-left: auto;
    }

    .footer-table td {
      padding: 1px 6px 1px 0;
      vertical-align: top;
    }

    .footer-table .ft-label {
      font-weight: 600;
      color: #24330d;
      white-space: nowrap;
      padding-right: 3px;
    }

    .footer-table .ft-label::after {
      content: ':';
    }

    .footer-table .ft-value {
      color: var(--bgs-muted);
      padding-right: 12px;
    }


    /* ── Tree pictogram ── */
    .tree-picto-wrap {
      display: grid;
      grid-template-columns: auto auto;
      gap: 6px;
    }
    .tree-picto-wrap .leaflet-control {
      margin: 0 !important;
    }
    .tree-pictogram {
      background: rgba(255,255,255,0.92);
      border: none;
      border-left: 8px solid var(--site-color, var(--bgs-border));
      padding: 12px 14px;
      font-family: var(--sans);
      font-size: 0.75rem;
      max-width: 320px;
      cursor: default;
      transition: background 0.15s;
    }
    .tree-pictogram:hover {
      background: rgba(255,255,255,1);
    }
    .tree-picto-title {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1.5px solid var(--bgs-border);
      padding-bottom: 4px;
      margin-bottom: 4px;
    }
    .tree-picto-subtitle {
      font-size: 0.7rem;
      color: var(--bgs-muted);
    }
    .tree-site-header {
      font-weight: 600;
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tree-species-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 5px;
    }
    .tree-icon-grid {
      display: grid;
      grid-template-columns: repeat(5, 14px);
      gap: 1px;
      flex-shrink: 0;
    }
    .tree-species-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 18px;
    }
    .tree-species-label {
      font-size: 0.65rem;
      color: var(--bgs-muted);
      white-space: nowrap;
      font-style: italic;
      line-height: 1.2;
    }
    .tree-species-common {
      font-size: 0.65rem;
      color: var(--bgs-muted);
      font-style: normal;
    }
    .tree-species-count {
      font-size: 0.65rem;
      color: var(--bgs-title);
      font-weight: 600;
    }
    .tree-icon-partial {
      display: inline-block;
      overflow: hidden;
      vertical-align: middle;
      line-height: 0;
    }
    .leaflet-top.leaflet-left {
      top: 50px;
      left: 50px;
    }

    /* ── Hide default Leaflet controls — we render our own ── */
    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution {
      font-size: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    /* Popup styling */
    .leaflet-popup-content-wrapper {
      border-radius: 2px;
      font-family: var(--sans);
      font-size: 0.85rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .leaflet-popup-tip {
      box-shadow: none;
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 700px) {
      .sheet {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto auto;
        padding: 10px;
      }
      .sidebar {
        padding-left: 0;
        padding-top: 10px;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
      }
      .sidebar .panel { flex: 1; min-width: 140px; }
      .header-left h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="sheet">

    <!-- ── MAP ── -->
    <div class="map-frame">
      <div id="map"></div>
      <div class="tick-marks" id="tickMarks"></div>
    </div>

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">

      <!-- North Arrow -->
      <div class="panel">
        <div class="north-arrow">
          <span>N</span>
          <svg viewBox="0 0 28 50" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="14,0 7,20 14,15 21,20" fill="#1a1a1a"/>
            <polygon points="14,15 7,20 14,50 21,20" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
          </svg>
        </div>
      </div>

      <!-- Scale -->
      <div class="panel">
        <div class="panel-title">Scale</div>
        <div class="scale-bar-container" id="scaleBarContainer">
          <div class="scale-bar" id="scaleBar"></div>
          <div class="scale-labels" id="scaleLabels"></div>
          <div class="scale-ratio" id="scaleRatio"></div>
        </div>
      </div>

      <!-- Legend -->
      <div class="panel">
        <div class="panel-title">Sites</div>
        <div id="legendEntries"></div>
      </div>

      <!-- Species key -->
      <div class="panel">
        <div class="panel-title">Species</div>
        <div style="font-size:0.7rem;color:var(--bgs-muted);margin-bottom:6px">1 icon = 500 trees</div>
        <div id="speciesLegend"></div>
      </div>

      <!-- Inset / location map -->
      <div class="panel">
        <div class="panel-title">Location</div>
        <div id="insetMap" class="inset-map"></div>
      </div>

    </aside>

    <!-- ── FOOTER ── -->
    <footer class="footer">
      <img src="logo.jpg" alt="Logo" class="footer-logo">
      <div class="footer-identity">
        <div class="footer-title">Kpakpiri</div>
        <div class="footer-subtitle">Tree Planting Sites &mdash; West Mamprusi Municipal</div>
      </div>
      <table class="footer-table">
        <tr>
          <td class="ft-label">Sites</td>
          <td class="ft-value">4</td>
          <td class="ft-label">Village</td>
          <td class="ft-value">Kpakpiri</td>
          <td class="ft-label">Survey</td>
          <td class="ft-value">Sep 2025</td>
        </tr>
        <tr>
          <td class="ft-label">Projection</td>
          <td class="ft-value">Web Mercator (EPSG:3857)</td>
          <td class="ft-label">Datum</td>
          <td class="ft-value">WGS 84</td>
          <td class="ft-label">Source</td>
          <td class="ft-value">&copy; OpenStreetMap contributors</td>
        </tr>
      </table>
    </footer>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.js"></script>
  <script src="data.js"></script>

  <script>
    // ── Site colour palette ──
    const siteColors = {
      "Kparikpiri planting site 1_2025": "#7b9f8e",
      "Kparikpiri Planting site 2_2025": "#d4a96a",
      "Kpakpiri planting site 3_2025":   "#a68bb2",
      "Kparipiri planting site 4":       "#c27256"
    };

    const siteLabels = {
      "Kparikpiri planting site 1_2025": "Site 1",
      "Kparikpiri Planting site 2_2025": "Site 2",
      "Kpakpiri planting site 3_2025":   "Site 3",
      "Kparipiri planting site 4":       "Site 4"
    };

    // ── Populate legend ──
    const legendEl = document.getElementById('legendEntries');
    for (const [site, color] of Object.entries(siteColors)) {
      const row = document.createElement('div');
      row.className = 'legend-row';
      row.innerHTML = `<div class="legend-swatch" style="background:${color}"></div>
        <span class="legend-label">${siteLabels[site]}</span>`;
      legendEl.appendChild(row);
    }

    // ── Nice scale system ──
    // Recompute fractional zoom levels for any latitude so the ratio is always exact
    const C = 40075016.686;
    const screenDPI = 96;
    const metersPerScreenPx = 0.0254 / screenDPI;

    const niceScales = [
      2000000, 1000000, 500000, 250000, 100000, 50000, 25000,
      10000, 5000, 2500, 1000, 500
    ];

    function zoomForScale(scale, lat) {
      return Math.log2((C * Math.cos(lat * Math.PI / 180)) / (scale * 256 * metersPerScreenPx));
    }

    function niceZoomLevels(lat) {
      return niceScales.map(s => zoomForScale(s, lat));
    }

    // Find which nice scale index we're closest to at the current zoom
    function currentScaleIndex(zoom, lat) {
      const levels = niceZoomLevels(lat);
      let bestIdx = 0;
      let bestDiff = Infinity;
      for (let i = 0; i < levels.length; i++) {
        const diff = Math.abs(levels[i] - zoom);
        if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
      }
      return bestIdx;
    }

    // ── Main map ──
    const initialZoom = zoomForScale(25000, 10.5393);
    const map = L.map('map', {
      zoomControl: false,
      attributionControl: true,
      zoomSnap: 0,
      zoomDelta: 0,
      wheelPxPerZoomLevel: 120
    }).setView([10.5393, -0.7397], initialZoom);

    // Snap zoom to nice levels, recalculated for current latitude
    function snapZoom(direction) {
      const lat = map.getCenter().lat;
      const nextIdx = _currentScaleIdx + (direction > 0 ? 1 : -1);
      if (nextIdx >= 0 && nextIdx < niceScales.length) {
        _currentScaleIdx = nextIdx;
        map.setZoom(zoomForScale(niceScales[nextIdx], lat));
      }
    }

    // Track which nice scale index we're at; recalculate on next zoom action
    let _currentScaleIdx = currentScaleIndex(map.getZoom(), map.getCenter().lat);
    let _snapping = false;

    // After any pan, smoothly correct zoom for the new latitude
    map.on('moveend', function() {
      if (_snapping) return;
      const lat = map.getCenter().lat;
      const correctZoom = zoomForScale(niceScales[_currentScaleIdx], lat);
      if (Math.abs(map.getZoom() - correctZoom) > 0.001) {
        _snapping = true;
        map.flyTo(map.getCenter(), correctZoom, { animate: true, duration: 0.3 });
      }
    });

    map.on('zoomend', function() { _snapping = false; });

    // Intercept scroll wheel with debounce
    let _wheelTimer = null;
    let _wheelAccum = 0;
    const mapEl = document.getElementById('map');
    mapEl.addEventListener('wheel', function(e) {
      e.preventDefault();
      _wheelAccum += e.deltaY;
      clearTimeout(_wheelTimer);
      _wheelTimer = setTimeout(function() {
        snapZoom(_wheelAccum < 0 ? 1 : -1);
        _wheelAccum = 0;
      }, 200);
    }, { passive: false });

    // Intercept keyboard +/-
    map.getContainer().addEventListener('keydown', function(e) {
      if (e.key === '=' || e.key === '+') { e.preventDefault(); snapZoom(1); }
      if (e.key === '-') { e.preventDefault(); snapZoom(-1); }
    });

    // Intercept double-click zoom
    map.doubleClickZoom.disable();
    map.on('dblclick', function() { snapZoom(1); });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '',
      className: 'bw-tile'
    }).addTo(map);

    // ── GeoJSON polygons ──
    function polyStyle(feature) {
      const site = feature.properties['group_survey/group_site/site_name1'];
      return {
        fillColor: siteColors[site] || "#ccc",
        color: '#2c2c2c',
        weight: 1.5,
        opacity: 1,
        fillOpacity: 0.7
      };
    }

    function formatSpecies(name) {
      return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    const geojsonLayer = L.geoJSON(geojsonData, {
      style: polyStyle,
      onEachFeature: (feature, layer) => {
        const p = feature.properties;
        const site = p['group_survey/group_site/site_name1'];
        const village = p['group_survey/group_basic_information_02/village'];
        const district = p['group_survey/group_basic_information_01/admin_2'];
        const date = p['group_survey/date_assessment'];
        const total = p['total_trees_planted'];
        const planted = p['group_survey/trees_planted_yes/repeat_planted'];
        const speciesRows = planted.map(s => {
          const sp = s['group_survey/trees_planted_yes/repeat_planted/group_planted_details/species'];
          const n = s['group_survey/trees_planted_yes/repeat_planted/group_planted_details/number_planted'];
          return `<tr><td style="padding-right:8px">${formatSpecies(sp)}</td><td style="text-align:right">${n.toLocaleString()}</td></tr>`;
        }).join('');
        layer.bindPopup(
          `<strong>${site}</strong><br>` +
          `<em>${village}, ${district}</em><br>` +
          `Date: ${date}<br><br>` +
          `<table style="font-size:0.85em">${speciesRows}` +
          `<tr style="border-top:1px solid #ccc;font-weight:600"><td>Total</td><td style="text-align:right">${total.toLocaleString()}</td></tr></table>`
        );
      }
    }).addTo(map);

    // ── Tree pictogram control ──
    (function() {
      const RATIO = 500;
      const ICON_W = 14, ICON_H = 18;

      const treeSvg = '<svg width="14" height="18" viewBox="0 0 14 18"><rect x="6" y="7" width="2" height="11" fill="CCC"/><circle cx="4" cy="6" r="3.5" fill="CCC"/><circle cx="10" cy="6" r="3.5" fill="CCC"/><circle cx="7" cy="4" r="3.5" fill="CCC"/></svg>';
      const speciesMeta = {
        khaya_Senegalensis:       { name: 'Khaya senegalensis', common: 'Mahogany',  color: '#8B4513' },
        cassia_sieberiana:        { name: 'Cassia sieberiana',  common: 'Cassia',    color: '#DAA520' },
        anacardium_occidentale:   { name: 'Anacardium occidentale', common: 'Cashew', color: '#2E8B57' },
        mangifera_indica:         { name: 'Mangifera indica',   common: 'Mango',     color: '#228B22' },
        tectona_grandis:          { name: 'Tectona grandis',    common: 'Teak',      color: '#6B8E23' },
        tamarindus_indica:        { name: 'Tamarindus indica',  common: 'Tamarind',  color: '#CD853F' },
        afzelia_africana:         { name: 'Afzelia africana',   common: 'Afzelia',   color: '#A0522D' },
        vitellaria_paradoxa:      { name: 'Vitellaria paradoxa', common: 'Shea',     color: '#BDB76B' }
      };

      function iconSvg(species) {
        const m = speciesMeta[species];
        return treeSvg.replace(/CCC/g, m.color);
      }

      // Order sites by label
      const siteKeys = Object.keys(siteColors);

      // Aggregate species per site from data (handle duplicate species entries + skip 0)
      const siteSpecies = {};
      geojsonData.features.forEach(f => {
        const siteKey = f.properties['group_survey/group_site/site_name1'];
        const planted = f.properties['group_survey/trees_planted_yes/repeat_planted'];
        const counts = {};
        planted.forEach(s => {
          const sp = s['group_survey/trees_planted_yes/repeat_planted/group_planted_details/species'];
          const n = s['group_survey/trees_planted_yes/repeat_planted/group_planted_details/number_planted'];
          counts[sp] = (counts[sp] || 0) + n;
        });
        siteSpecies[siteKey] = counts;
      });

      function renderIconGrid(species, count) {
        const full = Math.floor(count / RATIO);
        const frac = (count % RATIO) / RATIO;
        const svg = iconSvg(species);
        let html = '<div class="tree-icon-grid">';
        for (let i = 0; i < full; i++) html += svg;
        if (frac > 0.02) {
          const pw = Math.round(frac * ICON_W);
          html += '<span class="tree-icon-partial" style="width:' + Math.max(pw, 2) + 'px;height:' + ICON_H + 'px">' + svg + '</span>';
        }
        html += '</div>';
        return html;
      }

      // Create a wrapper div inside the topleft control corner
      var corner = map._controlCorners['topleft'];
      var wrap = L.DomUtil.create('div', 'tree-picto-wrap', corner);
      L.DomEvent.disableClickPropagation(wrap);
      L.DomEvent.disableScrollPropagation(wrap);

      // One box per site
      siteKeys.forEach(function(siteKey) {
        var label = siteLabels[siteKey];
        var color = siteColors[siteKey];
        var counts = siteSpecies[siteKey];
        if (!counts) return;
        var total = Object.values(counts).reduce(function(a, b) { return a + b; }, 0);

        var box = L.DomUtil.create('div', 'tree-pictogram', wrap);
        box.style.setProperty('--site-color', color);
        box.innerHTML = '<div class="tree-site-header">' +
          label + ' (' + total.toLocaleString() + ')</div>';

        // Sort species by count descending
        var speciesList = Object.entries(counts)
          .filter(function(e) { return e[1] > 0; })
          .sort(function(a, b) { return b[1] - a[1]; });

        speciesList.forEach(function(entry) {
          var sp = entry[0], n = entry[1];
          var meta = speciesMeta[sp];
          if (!meta) return;
          box.innerHTML += '<div class="tree-species-row">' +
            renderIconGrid(sp, n) +
            '<div class="tree-species-info">' +
              '<span class="tree-species-label">' + meta.name + ' <span class="tree-species-common">(' + meta.common + ')</span></span>' +
              '<span class="tree-species-count">' + n.toLocaleString() + '</span>' +
            '</div></div>';
        });

        // Hover: highlight corresponding polygon
        (function(key, boxEl) {
          var targetLayer = null;
          geojsonLayer.eachLayer(function(layer) {
            if (layer.feature.properties['group_survey/group_site/site_name1'] === key) {
              targetLayer = layer;
            }
          });
          if (!targetLayer) return;
          boxEl.addEventListener('mouseenter', function() {
            targetLayer.setStyle({ weight: 3.5, color: '#1a1a1a', fillOpacity: 0.9 });
            targetLayer.bringToFront();
          });
          boxEl.addEventListener('mouseleave', function() {
            geojsonLayer.resetStyle(targetLayer);
          });
        })(siteKey, box);
      });

      // Populate sidebar species legend
      var specLeg = document.getElementById('speciesLegend');
      Object.entries(speciesMeta).forEach(function(entry) {
        var sp = entry[0], meta = entry[1];
        var row = document.createElement('div');
        row.className = 'legend-row';
        row.style.marginBottom = '4px';
        row.innerHTML = iconSvg(sp) +
          '<span class="legend-label" style="margin-left:6px;font-size:0.72rem"><i>' + meta.name + '</i> (' + meta.common + ')</span>';
        specLeg.appendChild(row);
      });
    })();

    // ── Dynamic scale bar ──
    function updateScaleBar() {
      const barEl = document.getElementById('scaleBar');
      const labelsEl = document.getElementById('scaleLabels');
      const ratioEl = document.getElementById('scaleRatio');
      barEl.innerHTML = '';
      labelsEl.innerHTML = '';

      // Compute metres-per-pixel at map centre
      const centre = map.getCenter();
      const zoom = map.getZoom();
      const metersPerPx = 40075016.686 * Math.cos(centre.lat * Math.PI / 180) / Math.pow(2, zoom + 8);

      // Bar width in pixels (use panel width)
      const barWidth = barEl.parentElement.offsetWidth;
      const maxMeters = barWidth * metersPerPx;

      // Pick a nice round distance and segment count that guarantees
      // a minimum pixel width per segment (so labels never overlap)
      const minPxPerSeg = 36;
      const niceValues = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000, 50000, 100000];
      const segOptions = [4, 2]; // prefer 4 segments, fall back to 2

      let dist = niceValues[0];
      let segments = segOptions[0];

      for (const segs of segOptions) {
        let found = false;
        for (const v of niceValues) {
          const px = v / metersPerPx;
          if (px > barWidth) break;
          if (px / segs >= minPxPerSeg) {
            dist = v;
            segments = segs;
            found = true;
          }
        }
        if (found) break;
      }

      const segDist = dist / segments;
      const totalPx = dist / metersPerPx;
      barEl.style.width = Math.max(totalPx, minPxPerSeg * segments) + 'px';

      for (let i = 0; i < segments; i++) {
        const seg = document.createElement('div');
        seg.className = 'scale-segment';
        barEl.appendChild(seg);
      }

      labelsEl.style.width = totalPx + 'px';
      const useKm = dist >= 1000;
      for (let i = 0; i <= segments; i++) {
        const lbl = document.createElement('span');
        const m = segDist * i;
        lbl.textContent = useKm ? (m / 1000) : m;
        lbl.style.left = (i / segments * 100) + '%';
        labelsEl.appendChild(lbl);
      }
      // Unit label below
      let unitEl = document.getElementById('scaleUnit');
      if (!unitEl) {
        unitEl = document.createElement('div');
        unitEl.id = 'scaleUnit';
        unitEl.className = 'scale-unit';
        labelsEl.parentElement.appendChild(unitEl);
      }
      unitEl.textContent = useKm ? 'km' : 'm';

      // Exact representative fraction
      const screenDPI = 96;
      const metersPerScreenUnit = 0.0254 / screenDPI;
      const rf = Math.round(metersPerPx / metersPerScreenUnit);
      ratioEl.textContent = '1 : ' + rf.toLocaleString();
    }

    updateScaleBar();
    map.on('zoomend', updateScaleBar);
    map.on('moveend', updateScaleBar);

    // ── Inset / location map ──
    // Defer initialisation so the container has a painted size
    let insetMap, extentRect;

    function insetZoom() {
      // Show ~4 zoom levels out from main map, clamped to reasonable range
      return Math.max(1, Math.min(map.getZoom() - 8, 12));
    }

    function initInsetMap() {
      insetMap = L.map('insetMap', {
        zoomControl: false,
        attributionControl: false,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        keyboard: false,
        boxZoom: false
      }).setView(map.getCenter(), insetZoom());

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        className: 'bw-tile'
      }).addTo(insetMap);

      updateExtentRect();
      map.on('moveend', updateExtentRect);
      map.on('zoomend', updateExtentRect);
    }

    function updateExtentRect() {
      if (!insetMap) return;
      // Re-centre and re-zoom the inset to track the main map
      insetMap.setView(map.getCenter(), insetZoom(), { animate: false });
      if (extentRect) insetMap.removeLayer(extentRect);
      extentRect = L.rectangle(map.getBounds(), {
        color: '#c0392b',
        weight: 2,
        fillColor: '#c0392b',
        fillOpacity: 0.15
      }).addTo(insetMap);
    }

    // Wait for layout to settle, then init the inset
    setTimeout(function() {
      initInsetMap();
    }, 200);

    // ── Graticule tick marks ──
    function renderTicks() {
      const container = document.getElementById('tickMarks');
      container.innerHTML = '';
      const bounds = map.getBounds();
      const mapEl = document.getElementById('map');
      const w = mapEl.offsetWidth;
      const h = mapEl.offsetHeight;

      const nLon = 6;
      const nLat = 5;
      const lonMin = bounds.getWest();
      const lonMax = bounds.getEast();
      const latMin = bounds.getSouth();
      const latMax = bounds.getNorth();

      function niceStep(range, count) {
        const raw = range / count;
        const mag = Math.pow(10, Math.floor(Math.log10(raw)));
        const options = [1, 2, 2.5, 5, 10];
        for (const m of options) { if (mag * m >= raw) return mag * m; }
        return mag * 10;
      }

      const lonStep = niceStep(lonMax - lonMin, nLon);
      const latStep = niceStep(latMax - latMin, nLat);

      const lonStart = Math.ceil(lonMin / lonStep) * lonStep;
      const latStart = Math.ceil(latMin / latStep) * latStep;

      for (let lon = lonStart; lon <= lonMax; lon += lonStep) {
        const pt = map.latLngToContainerPoint([latMin, lon]);
        if (pt.x < 5 || pt.x > w - 5) continue;

        const tTop = document.createElement('div');
        tTop.className = 'tick tick-top';
        tTop.style.left = pt.x + 'px';
        tTop.style.top = '0';
        container.appendChild(tTop);

        const tBot = document.createElement('div');
        tBot.className = 'tick tick-bottom';
        tBot.style.left = pt.x + 'px';
        tBot.style.bottom = '0';
        container.appendChild(tBot);

        const lbl = document.createElement('div');
        lbl.className = 'tick-label';
        lbl.style.left = (pt.x + 3) + 'px';
        lbl.style.bottom = '2px';
        lbl.textContent = lon.toFixed(3) + '\u00B0';
        container.appendChild(lbl);
      }

      for (let lat = latStart; lat <= latMax; lat += latStep) {
        const pt = map.latLngToContainerPoint([lat, lonMin]);
        if (pt.y < 5 || pt.y > h - 5) continue;

        const tLeft = document.createElement('div');
        tLeft.className = 'tick tick-left';
        tLeft.style.top = pt.y + 'px';
        tLeft.style.left = '0';
        container.appendChild(tLeft);

        const tRight = document.createElement('div');
        tRight.className = 'tick tick-right';
        tRight.style.top = pt.y + 'px';
        tRight.style.right = '0';
        container.appendChild(tRight);

        const lbl = document.createElement('div');
        lbl.className = 'tick-label';
        lbl.style.top = (pt.y - 10) + 'px';
        lbl.style.left = '3px';
        lbl.textContent = lat.toFixed(3) + '\u00B0';
        container.appendChild(lbl);
      }
    }

    renderTicks();
    map.on('moveend', renderTicks);
    window.addEventListener('resize', function() {
      renderTicks();
      updateScaleBar();
      if (insetMap) insetMap.invalidateSize();
    });
  </script>
</body>
</html>
